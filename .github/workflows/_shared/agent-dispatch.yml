name: Agent Dispatch (reusable)

on:
  workflow_call:
    inputs:
      prompt_template:
        description: 'Name of the prompt template in .github/agent-prompts/ (without .md)'
        required: true
        type: string
      context_json:
        description: 'JSON string of template variables to interpolate into the prompt'
        required: true
        type: string
      working_branch:
        description: 'Branch the agent should operate on'
        required: true
        type: string
      pr_number:
        description: 'PR number if the agent is responding to a PR (0 = none)'
        required: false
        type: number
        default: 0
      timeout_minutes:
        description: 'Hard timeout for the agent job'
        required: false
        type: number
        default: 30
    outputs:
      outcome:
        description: 'success | partial | failed | skipped'
        value: ${{ jobs.run-agent.outputs.outcome }}
      summary:
        description: 'One-paragraph summary written by the agent'
        value: ${{ jobs.run-agent.outputs.summary }}
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_TOKEN:
        required: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    outputs:
      outcome: ${{ steps.run.outputs.outcome }}
      summary: ${{ steps.run.outputs.summary }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.working_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build prompt
        id: build-prompt
        run: |
          TEMPLATE_FILE=".github/agent-prompts/${{ inputs.prompt_template }}.md"
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "::error::Prompt template not found: $TEMPLATE_FILE"
            exit 1
          fi
          PROMPT=$(cat "$TEMPLATE_FILE")
          # Interpolate context variables from JSON
          echo '${{ inputs.context_json }}' > /tmp/ctx.json
          for KEY in $(jq -r 'keys[]' /tmp/ctx.json); do
            VALUE=$(jq -r --arg k "$KEY" '.[$k]' /tmp/ctx.json)
            PROMPT="${PROMPT//\$\{\{${KEY}\}\}/$VALUE}"
          done
          # Write final prompt to a temp file to avoid ARG_MAX limits
          printf '%s' "$PROMPT" > /tmp/agent-prompt.txt
          echo "Prompt built ($(wc -c < /tmp/agent-prompt.txt) bytes)"

      - name: Run Claude Code agent
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WORKING_BRANCH: ${{ inputs.working_branch }}
        run: |
          set +e
          # Run claude with the constructed prompt; capture exit code
          npx @anthropic-ai/claude-code \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/agent-prompt.txt)" \
            > /tmp/agent-output.txt 2>&1
          EXIT_CODE=$?
          set -e

          cat /tmp/agent-output.txt

          if [ $EXIT_CODE -eq 0 ]; then
            OUTCOME="success"
          else
            OUTCOME="failed"
          fi

          # Extract summary: last non-empty paragraph from agent output
          SUMMARY=$(awk 'BEGIN{p=""} /^$/{if(p!="") last=p; p=""} !/^$/{p=p" "$0} END{if(p!="") last=p; print last}' /tmp/agent-output.txt | head -c 2000)

          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
          # Use multiline output for summary
          {
            echo "summary<<AGENT_SUMMARY_EOF"
            echo "$SUMMARY"
            echo "AGENT_SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "::notice::Agent outcome: $OUTCOME"
