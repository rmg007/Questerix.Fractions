name: Agent Dispatch

on:
  workflow_call:
    inputs:
      prompt_template:
        description: 'Name of the prompt template file (without .md) in .github/agent-prompts/'
        required: true
        type: string
      context_json:
        description: 'JSON object of context variables to substitute into the prompt template'
        required: false
        type: string
        default: '{}'
      working_branch:
        description: 'Branch the agent should commit changes to'
        required: true
        type: string
      pr_number:
        description: 'PR number for context (optional)'
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Maximum minutes to allow the agent to run'
        required: false
        type: number
        default: 30
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_TOKEN:
        required: true
    outputs:
      outcome:
        description: 'Result of agent run: success, partial, or failure'
        value: ${{ jobs.run-agent.outputs.outcome }}
      summary:
        description: 'Human-readable summary produced by the agent'
        value: ${{ jobs.run-agent.outputs.summary }}

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    outputs:
      outcome: ${{ steps.agent.outputs.outcome }}
      summary: ${{ steps.agent.outputs.summary }}

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.working_branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build prompt from template
        id: build-prompt
        run: |
          TEMPLATE_FILE=".github/agent-prompts/${{ inputs.prompt_template }}.md"
          if [ ! -f "$TEMPLATE_FILE" ]; then
            echo "ERROR: Prompt template not found: $TEMPLATE_FILE"
            exit 1
          fi
          PROMPT=$(cat "$TEMPLATE_FILE")
          CONTEXT='${{ inputs.context_json }}'
          # Substitute each key from context_json into the prompt
          echo "$CONTEXT" | python3 - <<'PYEOF'
          import json, os, sys, re
          context = json.loads(os.environ.get('CONTEXT', '{}'))
          with open(os.environ['TEMPLATE_FILE']) as f:
              prompt = f.read()
          for key, value in context.items():
              prompt = prompt.replace(f'${{{{{key}}}}}', str(value))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              # Write prompt as multiline output
              delimiter = 'PROMPT_EOF'
              out.write(f'prompt<<{delimiter}\n{prompt}\n{delimiter}\n')
          PYEOF
        env:
          TEMPLATE_FILE: .github/agent-prompts/${{ inputs.prompt_template }}.md
          CONTEXT: ${{ inputs.context_json }}

      - name: Run Claude agent
        id: agent
        run: |
          # Invoke claude-code non-interactively with the rendered prompt
          OUTCOME="failure"
          SUMMARY=""
          AGENT_OUTPUT=$(npx @anthropic-ai/claude-code \
            --non-interactive \
            --print \
            "${{ steps.build-prompt.outputs.prompt }}" 2>&1) && OUTCOME="success" || true
          SUMMARY=$(echo "$AGENT_OUTPUT" | tail -20)
          # Detect partial: agent output present but exit code non-zero
          if [ "$OUTCOME" != "success" ] && [ -n "$AGENT_OUTPUT" ]; then
            OUTCOME="partial"
          fi
          {
            echo "outcome=$OUTCOME"
            echo "summary<<SUMMARY_EOF"
            echo "$SUMMARY"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
