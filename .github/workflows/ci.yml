name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast-fail gate: catches config drift before the 20-min cascade
  # Fails if workflows were edited manually instead of via gen:workflows
  consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Branch name compliance
        # Mirrors .husky/pre-push regex so CI catches any push that
        # bypassed the local hook with --no-verify. Format:
        # <type>/YYYY-MM-DD-<slug> with type in
        # {feat,fix,refactor,chore,test,plans,docs}. Exempt: main,
        # claude/*, worktree-agent-*.
        # On PR events the head ref is in github.head_ref; on push
        # events it's in github.ref_name.
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          echo "Checking branch: $BRANCH"
          case "$BRANCH" in
            main|claude/*|worktree-agent-*)
              echo "Exempt branch — skipping name check."
              exit 0
              ;;
          esac
          if ! echo "$BRANCH" | grep -qE '^(feat|fix|refactor|chore|test|plans|docs)/[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9][a-z0-9-]*$'; then
            echo ""
            echo "ERROR: branch name '$BRANCH' is non-compliant."
            echo "Required shape: <type>/YYYY-MM-DD-<slug>"
            echo "  type ∈ {feat, fix, refactor, plans, chore, docs, test}"
            echo "  slug: lowercase, kebab-case"
            echo "See docs/00-foundation/git-workflow.md and CLAUDE.md → 'Git workflow'."
            exit 1
          fi
          echo "Branch name is compliant."
      - name: Regenerate workflows and check for drift
        run: |
          npm run gen:workflows
          git diff --exit-code .github/workflows || (echo "ERROR: Workflow drift detected. Run 'npm run gen:workflows' and commit the result." && exit 1)
      - name: Residual lint (timeout consistency + bundle budget)
        run: npm run lint:ci

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: consistency

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Agent harness health check
        run: npm run agent-doctor

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage gate
        run: npm run test:coverage

      - name: Integration tests
        run: npm run test:integration

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pin CI to the chromium project only — the full 5-device matrix
      # (chromium + iPhone SE/12 + Pixel 5 + iPad Mini) regularly exceeds the
      # 20-min job timeout, causing every PR test job to be cancelled rather
      # than provide a real signal. Run the full matrix locally with
      # 'npx playwright test' before tagging a release. See PR #64 for the
      # timeout history.
      - name: E2E tests
        run: npm run test:e2e -- --project=chromium

      - name: A11y tests
        run: npm run test:a11y -- --project=chromium

      - name: Production build
        run: npm run build

      # Hard gate — per docs/30-architecture/performance-budget.md §1
      # 1.0 MB gzipped = 1,048,576 bytes
      - name: Bundle size guard
        run: |
          GZ=$(find dist -name '*.js' -exec gzip -c {} \; | wc -c)
          echo "Gzipped JS total: ${GZ} bytes (budget: 1048576)"
          if [ "$GZ" -gt 1048576 ]; then
            echo "ERROR: Bundle exceeds 1.0 MB gzipped budget (${GZ} > 1048576)"
            echo "Run: npx vite-bundle-visualizer to identify the offending chunk."
            exit 1
          fi
