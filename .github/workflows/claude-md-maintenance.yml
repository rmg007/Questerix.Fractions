name: CLAUDE.md Maintenance

on:
  schedule:
    - cron: '0 3 1 * *'  # 1st of every month, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # Kill-switch: set Actions variable AGENT_AUTONOMY_ENABLED=false to halt.
  # -------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Kill switch check
        id: check
        run: |
          if [ "${{ vars.AGENT_AUTONOMY_ENABLED }}" != "true" ]; then
            echo "::notice::Agent autonomy is disabled (AGENT_AUTONOMY_ENABLED != 'true'). Skipping claude-md-maintenance."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  maintain:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------
      # Create a dated chore branch for the agent to commit into
      # ------------------------------------------------------------------
      - name: Create working branch
        id: branch
        run: |
          BRANCH="chore/$(date +%Y-%m-%d)-claude-md-maintenance"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Dispatch the reusable agent workflow
      # ------------------------------------------------------------------
      - name: Dispatch agent
        id: agent
        uses: ./.github/workflows/_shared/agent-dispatch.yml
        with:
          prompt_template: claude-md-maintenance
          context_json: '{}'
          working_branch: ${{ steps.branch.outputs.branch }}
          timeout_minutes: 20
        secrets:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # ------------------------------------------------------------------
      # Open a PR if the agent succeeded
      # ------------------------------------------------------------------
      - name: Open pull request
        if: steps.agent.outputs.outcome == 'success'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "docs(claude-md): monthly self-maintenance ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
## Summary

Auto-generated by the monthly CLAUDE.md Maintenance workflow.

- Compared `.claude/learnings.md` against `CLAUDE.md` for missing gotchas
- Checked git log (last 30 days) for merged bug fixes to remove from the Active bugs table
- Applied surgical updates to `CLAUDE.md`
- Pruned stale entries from `.claude/learnings.md`

## Agent summary

${{ steps.agent.outputs.summary }}

## Checklist

- [ ] Review CLAUDE.md diff — confirm all changes are accurate
- [ ] Check learnings.md — confirm pruned entries are truly stale
- [ ] Verify `npm run typecheck` passes
EOF
)" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "autonomy,docs")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo $PR_URL | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Telemetry: append run record to docs/40-validation/autonomy-log.md
      # ------------------------------------------------------------------
      - name: Append telemetry
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTCOME: ${{ steps.agent.outputs.outcome || 'skipped' }}
          PR_URL: ${{ steps.pr.outputs.pr_url || '' }}
        run: |
          LOG_FILE="docs/40-validation/autonomy-log.md"
          ENTRY="| $(date -u +%Y-%m-%dT%H:%M:%SZ) | claude-md-maintenance | ${OUTCOME} | ${PR_URL} |"
          git fetch origin main
          git checkout main
          if [ ! -f "$LOG_FILE" ]; then
            echo "# Autonomy Run Log" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "| Timestamp | Workflow | Outcome | PR |" >> "$LOG_FILE"
            echo "|-----------|----------|---------|-----|" >> "$LOG_FILE"
          fi
          echo "$ENTRY" >> "$LOG_FILE"
          git add "$LOG_FILE"
          git commit -m "chore(autonomy): log claude-md-maintenance run" || true
          git push origin main || true
