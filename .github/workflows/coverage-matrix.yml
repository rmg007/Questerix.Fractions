name: Coverage Matrix

on:
  schedule:
    - cron: '0 4 * * 1'  # Monday 04:00 UTC
  push:
    paths:
      - 'src/scenes/utils/levelMeta.ts'
      - 'tests/e2e/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # Kill-switch: set Actions variable AGENT_AUTONOMY_ENABLED=false to halt.
  # -------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Kill switch check
        id: check
        run: |
          if [ "${{ vars.AGENT_AUTONOMY_ENABLED }}" != "true" ]; then
            echo "::notice::Agent autonomy is disabled (AGENT_AUTONOMY_ENABLED != 'true'). Skipping coverage-matrix."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  regenerate:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------
      # Create a dated chore branch for the agent to commit into
      # ------------------------------------------------------------------
      - name: Create working branch
        id: branch
        run: |
          BRANCH="chore/$(date +%Y-%m-%d)-coverage-matrix"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Dispatch the reusable agent workflow
      # ------------------------------------------------------------------
      - name: Dispatch agent
        id: agent
        uses: ./.github/workflows/_shared/agent-dispatch.yml
        with:
          prompt_template: coverage-matrix
          context_json: '{}'
          working_branch: ${{ steps.branch.outputs.branch }}
          timeout_minutes: 20
        secrets:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # ------------------------------------------------------------------
      # Open a PR if the agent succeeded
      # ------------------------------------------------------------------
      - name: Open pull request
        if: steps.agent.outputs.outcome == 'success'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "docs(validation): regenerate archetype×level coverage matrix ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
## Summary

Auto-generated by the Coverage Matrix workflow.

- Re-read `src/scenes/utils/levelMeta.ts` for declared (level, archetype) pairs
- Scanned `tests/e2e/` for actually-tested combinations
- Updated `docs/40-validation/coverage-matrix.md` with ✅ / ⚠️ / ❌ table
- Created stub Playwright test files for any ⚠️ (declared but untested) cells

## Agent summary

${{ steps.agent.outputs.summary }}

## Checklist

- [ ] Review ⚠️ cells — confirm stubs are at the right paths
- [ ] Fill in real test logic for highest-priority gaps
- [ ] Verify `npm run typecheck` passes
EOF
)" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "autonomy,coverage")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo $PR_URL | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Telemetry: append run record to docs/40-validation/autonomy-log.md
      # ------------------------------------------------------------------
      - name: Append telemetry
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTCOME: ${{ steps.agent.outputs.outcome || 'skipped' }}
          PR_URL: ${{ steps.pr.outputs.pr_url || '' }}
        run: |
          LOG_FILE="docs/40-validation/autonomy-log.md"
          ENTRY="| $(date -u +%Y-%m-%dT%H:%M:%SZ) | coverage-matrix | ${OUTCOME} | ${PR_URL} |"
          git fetch origin main
          git checkout main
          if [ ! -f "$LOG_FILE" ]; then
            echo "# Autonomy Run Log" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "| Timestamp | Workflow | Outcome | PR |" >> "$LOG_FILE"
            echo "|-----------|----------|---------|-----|" >> "$LOG_FILE"
          fi
          echo "$ENTRY" >> "$LOG_FILE"
          git add "$LOG_FILE"
          git commit -m "chore(autonomy): log coverage-matrix run" || true
          git push origin main || true
