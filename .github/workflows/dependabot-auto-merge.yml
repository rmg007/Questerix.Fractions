name: R5 — Dependabot auto-merge

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Author guard — only run for dependabot
        if: github.actor != 'dependabot[bot]'
        run: exit 0

      - name: Handle pinned packages and determine bump type
        uses: actions/github-script@v7
        id: bump-check
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title;
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Check for C4-pinned packages: phaser, dexie, vite
            const pinnedPackages = ['phaser', 'dexie', 'vite'];
            const titleLower = title.toLowerCase();
            const isPinned = pinnedPackages.some(pkg => titleLower.includes(pkg));

            if (isPinned) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: 'This package is pinned per C4 constraint (locked stack until 2029). Closing without merge.',
              });
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                state: 'closed',
              });
              core.setOutput('action', 'pinned');
              return;
            }

            // Parse semver bump type from title: "Bump X from A to B" or "Update X from A to B"
            const versionMatch = title.match(/from\s+v?(\d+)\.(\d+)\.(\d+)\s+to\s+v?(\d+)\.(\d+)\.(\d+)/i);
            if (!versionMatch) {
              // Cannot parse versions — treat as minor/patch and let CI decide
              core.setOutput('action', 'proceed');
              return;
            }

            const [, fromMajor, fromMinor, fromPatch, toMajor, toMinor, toPatch] = versionMatch.map(Number);

            if (toMajor > fromMajor) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: 'Major version bump detected. Manual review required per project policy.',
              });
              core.setOutput('action', 'major');
              return;
            }

            core.setOutput('action', 'proceed');

      - name: Stop if pinned or major bump
        if: steps.bump-check.outputs.action != 'proceed'
        run: |
          echo "::notice::Not auto-merging: action=${{ steps.bump-check.outputs.action }}"
          exit 0

      - name: Wait for CI checks to pass
        run: |
          for i in $(seq 1 20); do
            STATUS=$(gh pr view ${{ github.event.pull_request.number }} --json statusCheckRollup --jq '.statusCheckRollup[].state' | sort -u)
            echo "Poll $i — statuses: $STATUS"
            if echo "$STATUS" | grep -q "SUCCESS"; then
              echo "CI passed"
              break
            fi
            if echo "$STATUS" | grep -qE "FAILURE|ERROR"; then
              echo "::notice::CI failed — not merging"
              exit 0
            fi
            sleep 30
          done

      - name: Enable auto-merge (squash)
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
