name: Misconception Synthesis

on:
  workflow_run:
    workflows: ["Curriculum Loop"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # Kill-switch: set Actions variable AGENT_AUTONOMY_ENABLED=false to halt all
  # agent workflows without touching code.
  # -------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - name: Kill switch check
        id: check
        run: |
          if [ "${{ vars.AGENT_AUTONOMY_ENABLED }}" != "true" ]; then
            echo "::notice::Agent autonomy is disabled (AGENT_AUTONOMY_ENABLED != 'true'). Skipping misconception-synthesis."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

  synthesize:
    needs: gate
    if: |
      needs.gate.outputs.enabled == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      # ------------------------------------------------------------------
      # Find curriculum files changed in the most recent push / workflow_run
      # ------------------------------------------------------------------
      - name: Find new curriculum files
        id: changed
        run: |
          FILES=$(git diff HEAD~1 --name-only -- 'pipeline/output/**' 'public/curriculum/**' 2>/dev/null || true)
          if [ -z "$FILES" ]; then
            echo "No new curriculum files detected — nothing to synthesize."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # JSON-encode newline-separated list for context_json
            JSON_LIST=$(echo "$FILES" | jq -Rs '.')
            echo "files_json=${JSON_LIST}" >> "$GITHUB_OUTPUT"
            echo "New curriculum files:"
            echo "$FILES"
          fi

      - name: Skip if no curriculum changes
        if: steps.changed.outputs.skip == 'true'
        run: |
          echo "::notice::No pipeline/output or public/curriculum changes found — skipping agent dispatch."
          exit 0

      # ------------------------------------------------------------------
      # Create a dated feature branch for the agent to commit into
      # ------------------------------------------------------------------
      - name: Create working branch
        if: steps.changed.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH="feat/$(date +%Y-%m-%d)-misconception-synthesis"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Dispatch the reusable agent workflow
      # ------------------------------------------------------------------
      - name: Dispatch agent
        if: steps.changed.outputs.skip != 'true'
        id: agent
        uses: ./.github/workflows/_shared/agent-dispatch.yml
        with:
          prompt_template: misconception-synthesis
          context_json: >-
            {"NEW_CURRICULUM_FILES": ${{ steps.changed.outputs.files_json }}}
          working_branch: ${{ steps.branch.outputs.branch }}
          timeout_minutes: 35
        secrets:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # ------------------------------------------------------------------
      # Open a PR if the agent succeeded
      # ------------------------------------------------------------------
      - name: Open pull request
        if: steps.changed.outputs.skip != 'true' && steps.agent.outputs.outcome == 'success'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "feat(misconceptions): synthesize detectors from curriculum refresh ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
## Summary

Auto-generated by the Misconception Synthesis workflow after a Curriculum Loop run.

- Analyzed new curriculum files for uncovered wrong-answer patterns
- Added new MC-* entries to `docs/10-curriculum/misconceptions.md`
- Added matching detector stubs to `src/engine/misconceptionDetectors.ts`
- Added fixture files under `tests/fixtures/misconceptions/`

## Agent summary

${{ steps.agent.outputs.summary }}

## Checklist

- [ ] Review new MC-* codes for pedagogical accuracy
- [ ] Confirm detector trigger patterns match curriculum distractors
- [ ] Verify `npm run test:unit` passes locally
EOF
)" \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "autonomy,misconceptions")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$(echo $PR_URL | grep -oE '[0-9]+$')" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Telemetry: append run record to docs/40-validation/autonomy-log.md
      # ------------------------------------------------------------------
      - name: Append telemetry
        if: always() && steps.changed.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OUTCOME: ${{ steps.agent.outputs.outcome || 'skipped' }}
          PR_URL: ${{ steps.pr.outputs.pr_url || '' }}
        run: |
          LOG_FILE="docs/40-validation/autonomy-log.md"
          ENTRY="| $(date -u +%Y-%m-%dT%H:%M:%SZ) | misconception-synthesis | ${OUTCOME} | ${PR_URL} |"
          git fetch origin main
          git checkout main
          if [ ! -f "$LOG_FILE" ]; then
            echo "# Autonomy Run Log" > "$LOG_FILE"
            echo "" >> "$LOG_FILE"
            echo "| Timestamp | Workflow | Outcome | PR |" >> "$LOG_FILE"
            echo "|-----------|----------|---------|-----|" >> "$LOG_FILE"
          fi
          echo "$ENTRY" >> "$LOG_FILE"
          git add "$LOG_FILE"
          git commit -m "chore(autonomy): log misconception-synthesis run" || true
          git push origin main || true
