name: Subagent PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: subagent-pr-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # newer push cancels in-progress audit

jobs:
  # ── Job 1 ─────────────────────────────────────────────────────────────────
  # Fetch changed files and compute path-filter outputs used by later jobs.
  # ──────────────────────────────────────────────────────────────────────────
  get-changed-files:
    runs-on: ubuntu-latest
    outputs:
      validators_changed:    ${{ steps.check.outputs.validators_changed }}
      interactions_changed:  ${{ steps.check.outputs.interactions_changed }}
      bundle_changed:        ${{ steps.check.outputs.bundle_changed }}
      engine_changed:        ${{ steps.check.outputs.engine_changed }}
      curriculum_changed:    ${{ steps.check.outputs.curriculum_changed }}
      any_src_changed:       ${{ steps.check.outputs.any_src_changed }}
      changed_files_list:    ${{ steps.check.outputs.changed_files_list }}
      diff_summary:          ${{ steps.check.outputs.diff_summary }}

    steps:
      - name: Compute path filters
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const paths = files.map(f => f.filename);
            const count = paths.length;

            // Path-filter helpers
            const match = (pattern) => paths.some(p => {
              if (pattern.endsWith('/**')) {
                return p.startsWith(pattern.slice(0, -3));
              }
              if (pattern.endsWith('/**/*.ts')) {
                const prefix = pattern.slice(0, -8);
                return p.startsWith(prefix) && p.endsWith('.ts');
              }
              return p === pattern;
            });

            const validators_changed = match('src/validators/**');

            const interactions_changed =
              match('src/components/**') ||
              match('src/scenes/interactions/**') ||
              paths.some(p => /^src\/scenes\/[^/]+Scene\.ts$/.test(p));

            const bundle_changed =
              paths.includes('package.json') ||
              paths.includes('package-lock.json');

            // Engine determinism — exclude the ports file itself, which is the boundary that may legally hold host calls.
            const engine_changed = paths.some(
              p => p.startsWith('src/engine/') && p !== 'src/engine/ports.ts'
            );

            // Curriculum byte-parity — both bundle paths plus pipeline output (a pipeline-only change still requires `npm run build:curriculum`).
            const curriculum_changed =
              paths.includes('public/curriculum/v1.json') ||
              paths.includes('src/curriculum/bundle.json') ||
              paths.some(p => p.startsWith('pipeline/output/'));

            const any_src_changed = paths.some(
              p => !p.startsWith('docs/') && !p.startsWith('PLANS/')
            );

            // Limit file list to 50 entries to stay within output size limits
            const changed_files_list = paths.slice(0, 50).join('\n');
            const diff_summary = `${count} file${count === 1 ? '' : 's'} changed in this PR`;

            core.setOutput('validators_changed',   String(validators_changed));
            core.setOutput('interactions_changed', String(interactions_changed));
            core.setOutput('bundle_changed',       String(bundle_changed));
            core.setOutput('engine_changed',       String(engine_changed));
            core.setOutput('curriculum_changed',   String(curriculum_changed));
            core.setOutput('any_src_changed',      String(any_src_changed));
            core.setOutput('changed_files_list',   changed_files_list);
            core.setOutput('diff_summary',         diff_summary);

  # ── Job 2 ─────────────────────────────────────────────────────────────────
  # C1–C10 constraint audit — runs whenever any non-docs source file changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-c1-c10:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.any_src_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "c1-c10-auditor",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
      max_tokens: 15000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 3 ─────────────────────────────────────────────────────────────────
  # A11y audit — runs when interaction/component/scene files changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-a11y:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.interactions_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "a11y-auditor",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
      max_tokens: 12000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 4 ─────────────────────────────────────────────────────────────────
  # Bundle audit — runs when package.json or package-lock.json changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-bundle:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.bundle_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "bundle-watcher",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
      max_tokens: 10000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 5 ─────────────────────────────────────────────────────────────────
  # Validator parity audit — runs when src/validators/** changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-validator-parity:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.validators_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "validator-parity-checker",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
      max_tokens: 10000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 6 ─────────────────────────────────────────────────────────────────
  # Engine determinism audit — runs when src/engine/** (excluding ports.ts) changed.
  # Gated on Phase 3 .claude/agents/engine-determinism-auditor.md being present.
  # ──────────────────────────────────────────────────────────────────────────
  audit-engine-determinism:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.engine_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "engine-determinism-auditor",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 10
      max_tokens: 8000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 7 ─────────────────────────────────────────────────────────────────
  # Curriculum byte-parity audit — runs when curriculum bundles or pipeline output changed.
  # Gated on Phase 3 .claude/agents/curriculum-byte-parity.md being present.
  # ──────────────────────────────────────────────────────────────────────────
  audit-curriculum-parity:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.curriculum_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "curriculum-byte-parity",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 5
      max_tokens: 6000
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Aggregator ────────────────────────────────────────────────────────────
  # Single consolidated PR comment, upserted under tag `subagent-audit-summary`.
  # Replaces the six prior per-agent post-*-comment jobs to avoid comment spam.
  # ──────────────────────────────────────────────────────────────────────────
  post-consolidated-comment:
    needs:
      - get-changed-files
      - audit-c1-c10
      - audit-a11y
      - audit-bundle
      - audit-validator-parity
      - audit-engine-determinism
      - audit-curriculum-parity
    if: always() && needs.get-changed-files.outputs.any_src_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Upsert consolidated PR comment
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: subagent-audit-summary
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Subagent Audit Summary

            ${{ needs.get-changed-files.outputs.diff_summary }}

            <details><summary>C1–C10 Constraint Audit</summary>

            ${{ needs.audit-c1-c10.result == 'skipped' && '_skipped (no relevant changes)_' || needs.audit-c1-c10.outputs.summary || '_auditor errored — manual review recommended_' }}
            </details>

            <details><summary>Accessibility Audit</summary>

            ${{ needs.audit-a11y.result == 'skipped' && '_skipped (no interaction/component/scene changes)_' || needs.audit-a11y.outputs.summary || '_auditor errored — verify ARIA labels, touch targets (≥44×44 px), and reduced-motion gating before merging_' }}
            </details>

            <details><summary>Bundle Size Audit</summary>

            ${{ needs.audit-bundle.result == 'skipped' && '_skipped (no package.json / package-lock.json changes)_' || needs.audit-bundle.outputs.summary || '_auditor errored — run `npm run measure-bundle` locally to verify the 1 MB gzipped budget before merging_' }}
            </details>

            <details><summary>Validator Parity Audit</summary>

            ${{ needs.audit-validator-parity.result == 'skipped' && '_skipped (no src/validators/** changes)_' || needs.audit-validator-parity.outputs.summary || '_auditor errored — confirm every changed `src/validators/*.ts` file has a matching Python clone and passing parity fixtures before merging_' }}
            </details>

            <details><summary>Engine Determinism Audit</summary>

            ${{ needs.audit-engine-determinism.result == 'skipped' && '_skipped (no engine changes)_' || needs.audit-engine-determinism.outputs.summary || '_auditor errored — run `npx eslint src/engine/**/*.ts` locally_' }}
            </details>

            <details><summary>Curriculum Byte-Parity Audit</summary>

            ${{ needs.audit-curriculum-parity.result == 'skipped' && '_skipped (no curriculum changes)_' || needs.audit-curriculum-parity.outputs.summary || '_auditor errored — run `sha256sum public/curriculum/v1.json src/curriculum/bundle.json` locally_' }}
            </details>

            *Consolidated by [subagent-pr-audit](/.github/workflows/subagent-pr-audit.yml). Re-runs on every push to this PR; this comment is upserted, not duplicated.*
