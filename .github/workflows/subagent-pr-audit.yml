name: Subagent PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: subagent-pr-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true  # newer push cancels in-progress audit

jobs:
  # ── Job 1 ─────────────────────────────────────────────────────────────────
  # Fetch changed files and compute path-filter outputs used by later jobs.
  # ──────────────────────────────────────────────────────────────────────────
  get-changed-files:
    runs-on: ubuntu-latest
    outputs:
      validators_changed:    ${{ steps.check.outputs.validators_changed }}
      interactions_changed:  ${{ steps.check.outputs.interactions_changed }}
      bundle_changed:        ${{ steps.check.outputs.bundle_changed }}
      any_src_changed:       ${{ steps.check.outputs.any_src_changed }}
      changed_files_list:    ${{ steps.check.outputs.changed_files_list }}
      diff_summary:          ${{ steps.check.outputs.diff_summary }}

    steps:
      - name: Compute path filters
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const paths = files.map(f => f.filename);
            const count = paths.length;

            // Path-filter helpers
            const match = (pattern) => paths.some(p => {
              if (pattern.endsWith('/**')) {
                return p.startsWith(pattern.slice(0, -3));
              }
              if (pattern.endsWith('/**/*.ts')) {
                const prefix = pattern.slice(0, -8);
                return p.startsWith(prefix) && p.endsWith('.ts');
              }
              return p === pattern;
            });

            const validators_changed = match('src/validators/**');

            const interactions_changed =
              match('src/components/**') ||
              match('src/scenes/interactions/**') ||
              paths.some(p => /^src\/scenes\/[^/]+Scene\.ts$/.test(p));

            const bundle_changed =
              paths.includes('package.json') ||
              paths.includes('package-lock.json');

            const any_src_changed = paths.some(
              p => !p.startsWith('docs/') && !p.startsWith('PLANS/')
            );

            // Limit file list to 50 entries to stay within output size limits
            const changed_files_list = paths.slice(0, 50).join('\n');
            const diff_summary = `${count} file${count === 1 ? '' : 's'} changed in this PR`;

            core.setOutput('validators_changed',   String(validators_changed));
            core.setOutput('interactions_changed', String(interactions_changed));
            core.setOutput('bundle_changed',       String(bundle_changed));
            core.setOutput('any_src_changed',      String(any_src_changed));
            core.setOutput('changed_files_list',   changed_files_list);
            core.setOutput('diff_summary',         diff_summary);

  # ── Job 2 ─────────────────────────────────────────────────────────────────
  # C1–C10 constraint audit — runs whenever any non-docs source file changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-c1-c10:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.any_src_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "c1-c10-auditor",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-c1-c10-comment:
    needs: [get-changed-files, audit-c1-c10]
    if: always() && needs.get-changed-files.outputs.any_src_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Post success comment
        if: needs.audit-c1-c10.outputs.outcome == 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: c1-c10-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## C1–C10 Constraint Audit

            ${{ needs.audit-c1-c10.outputs.summary }}

            ---
            *Automated audit by [c1-c10-auditor](/.claude/agents/c1-c10-auditor.md)*

      - name: Post failure fallback comment
        if: needs.audit-c1-c10.outputs.outcome != 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: c1-c10-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## C1–C10 Constraint Audit

            > [!WARNING]
            > The constraint auditor encountered an error and could not complete its review.
            > **Manual check recommended** — please verify C1–C10 constraints before merging.

            ---
            *Automated audit by [c1-c10-auditor](/.claude/agents/c1-c10-auditor.md)*

  # ── Job 3 ─────────────────────────────────────────────────────────────────
  # A11y audit — runs when interaction/component/scene files changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-a11y:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.interactions_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "a11y-auditor",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-a11y-comment:
    needs: [get-changed-files, audit-a11y]
    if: always() && needs.get-changed-files.outputs.interactions_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Post success comment
        if: needs.audit-a11y.outputs.outcome == 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: a11y-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Accessibility Audit

            ${{ needs.audit-a11y.outputs.summary }}

            ---
            *Automated audit by [a11y-auditor](/.claude/agents/a11y-auditor.md)*

      - name: Post failure fallback comment
        if: needs.audit-a11y.outputs.outcome != 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: a11y-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Accessibility Audit

            > [!WARNING]
            > The a11y auditor encountered an error and could not complete its review.
            > **Manual check recommended** — please verify ARIA labels, touch targets (≥44×44 px), and reduced-motion gating before merging.

            ---
            *Automated audit by [a11y-auditor](/.claude/agents/a11y-auditor.md)*

  # ── Job 4 ─────────────────────────────────────────────────────────────────
  # Bundle audit — runs when package.json or package-lock.json changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-bundle:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.bundle_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "bundle-watcher",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-bundle-comment:
    needs: [get-changed-files, audit-bundle]
    if: always() && needs.get-changed-files.outputs.bundle_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Post success comment
        if: needs.audit-bundle.outputs.outcome == 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: bundle-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Bundle Size Audit

            ${{ needs.audit-bundle.outputs.summary }}

            ---
            *Automated audit by [bundle-watcher](/.claude/agents/bundle-watcher.md)*

      - name: Post failure fallback comment
        if: needs.audit-bundle.outputs.outcome != 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: bundle-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Bundle Size Audit

            > [!WARNING]
            > The bundle-watcher encountered an error and could not complete its review.
            > **Manual check recommended** — run `npm run measure-bundle` locally to verify the 1 MB gzipped budget before merging.

            ---
            *Automated audit by [bundle-watcher](/.claude/agents/bundle-watcher.md)*

  # ── Job 5 ─────────────────────────────────────────────────────────────────
  # Validator parity audit — runs when src/validators/** changed.
  # ──────────────────────────────────────────────────────────────────────────
  audit-validator-parity:
    needs: get-changed-files
    if: needs.get-changed-files.outputs.validators_changed == 'true'
    continue-on-error: true

    uses: ./.github/workflows/_shared/agent-dispatch.yml
    with:
      prompt_template: subagent-audit
      context_json: >-
        {
          "SUBAGENT_NAME": "validator-parity-checker",
          "CHANGED_FILES": "${{ needs.get-changed-files.outputs.changed_files_list }}",
          "PR_NUMBER": "${{ github.event.pull_request.number }}",
          "DIFF_SUMMARY": "${{ needs.get-changed-files.outputs.diff_summary }}"
        }
      working_branch: ${{ github.event.pull_request.head.ref }}
      pr_number: ${{ github.event.pull_request.number }}
      timeout_minutes: 15
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-validator-parity-comment:
    needs: [get-changed-files, audit-validator-parity]
    if: always() && needs.get-changed-files.outputs.validators_changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Post success comment
        if: needs.audit-validator-parity.outputs.outcome == 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: validator-parity-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Validator Parity Audit

            ${{ needs.audit-validator-parity.outputs.summary }}

            ---
            *Automated audit by [validator-parity-checker](/.claude/agents/validator-parity-checker.md)*

      - name: Post failure fallback comment
        if: needs.audit-validator-parity.outputs.outcome != 'success'
        uses: ./.github/actions/pr-comment-update
        with:
          comment-tag: validator-parity-audit
          pr-number: ${{ github.event.pull_request.number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          content: |
            ## Validator Parity Audit

            > [!WARNING]
            > The validator-parity-checker encountered an error and could not complete its review.
            > **Manual check recommended** — confirm every changed `src/validators/*.ts` file has a matching Python clone and passing parity fixtures before merging.

            ---
            *Automated audit by [validator-parity-checker](/.claude/agents/validator-parity-checker.md)*
