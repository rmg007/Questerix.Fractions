name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual re-deploy from Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Don't cancel a deploy in progress

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need git history for build SHA injection

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pre-deploy gates: typecheck → lint → unit tests (173) → curriculum
      # validation → build → bundle size guard. Any failure aborts the deploy.
      - name: Run predeploy gate
        run: npm run predeploy

      # Deploy with wrangler. Env vars are read by wrangler automatically.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name questerix-fractions \
            --branch main \
            --commit-dirty=true

      # Wait for the new deployment to propagate to the live URL before checking
      - name: Wait for propagation
        run: sleep 20

      # Verify live site: 17 checks (security headers, MIME, SPA fallback,
      # privacy, build version, A11yLayer present, COEP absent).
      - name: Run postdeploy check
        run: node scripts/postdeploy-check.mjs

# ─── Required secrets (Settings → Secrets and variables → Actions) ──────────
#
#   CLOUDFLARE_API_TOKEN   dash.cloudflare.com → My Profile → API Tokens →
#                          Create Token → permissions: Account.Cloudflare Pages:Edit
#                          (zone-read also useful if managing custom domains)
#   CLOUDFLARE_ACCOUNT_ID  dash.cloudflare.com sidebar (Workers & Pages section)
#                          For this repo: 1ad655f025b0db1974614aac7ebec10a
#
# Local-dev path remains: `npm run deploy` from your machine. CI is the
# canonical deploy path; manual local deploys are for emergencies.
