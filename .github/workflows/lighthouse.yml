name: Lighthouse
on: [pull_request, push]
jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - run: npm install -g @lhci/cli@0.14.x
      - run: lhci autorun
