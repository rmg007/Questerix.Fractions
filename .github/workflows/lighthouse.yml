name: Lighthouse
# Skip on docs-only diffs — Lighthouse can't audit a markdown change.
on:
  pull_request:
    paths-ignore:
      - 'PLANS/**'
      - 'docs/**'
      - '.claude/**'
      - '*.md'
  push:
    paths-ignore:
      - 'PLANS/**'
      - 'docs/**'
      - '.claude/**'
      - '*.md'
jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm install -g @lhci/cli@0.14.x
      - run: lhci autorun
