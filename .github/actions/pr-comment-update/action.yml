name: PR Comment Update (idempotent)
description: |
  Creates or updates a single PR comment identified by a hidden HTML tag.
  Running this action twice with the same comment-tag updates rather than
  duplicates the comment.

inputs:
  comment-tag:
    description: "Unique slug used as a hidden HTML marker (e.g. c1-c10-audit)"
    required: true
  content:
    description: "Markdown body of the comment"
    required: true
  pr-number:
    description: "Pull request number"
    required: true
  github-token:
    description: "GitHub token with pull-requests: write permission"
    required: true
  mode:
    description: "'upsert' (default) — create if absent, update if present. 'replace' — always delete old then create."
    required: false
    default: upsert

runs:
  using: composite
  steps:
    - name: Upsert PR comment
      uses: actions/github-script@v7
      env:
        COMMENT_TAG: ${{ inputs.comment-tag }}
        COMMENT_BODY: ${{ inputs.content }}
        PR_NUMBER: ${{ inputs.pr-number }}
        MODE: ${{ inputs.mode }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const tag = `<!-- subagent-audit:${process.env.COMMENT_TAG} -->`;
          const body = `${tag}\n${process.env.COMMENT_BODY}`;
          const prNumber = parseInt(process.env.PR_NUMBER, 10);
          const mode = process.env.MODE || 'upsert';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100,
          });

          const existing = comments.find(c => c.body && c.body.includes(tag));

          if (existing && mode !== 'replace') {
            // Update in place
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
            core.info(`Updated existing comment ${existing.id} (tag: ${tag})`);
          } else {
            if (existing && mode === 'replace') {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
              core.info(`Deleted old comment ${existing.id} (tag: ${tag})`);
            }
            const { data: created } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
            core.info(`Created new comment ${created.id} (tag: ${tag})`);
          }
